# ===== SERVER =====
server.port=8080

# ===== DATABASE (MySQL - Production) =====
# Uncomment below and comment H2 section to use MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/amazon_clone?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== H2 IN-MEMORY DATABASE (Development) =====
spring.datasource.url=jdbc:h2:mem:amazon_clone;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== JWT =====
app.jwt.secret=AmazonCloneSecretKey2024VeryLongSecretKeyForJWTTokenSigningWithHS256Algorithm
app.jwt.expiration=86400000

# ===== LOGGING =====
logging.level.com.amazon=DEBUG
logging.level.org.springframework.security=DEBUG
